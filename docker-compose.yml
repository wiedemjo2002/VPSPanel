name: vpspanel

services:
  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    pids_limit: 128
    command: ["caddy", "run", "--config", "/runtime/Caddyfile", "--adapter", "caddyfile"]
    depends_on:
      panel:
        condition: service_healthy
    environment:
      PANEL_SITE_ADDRESS: ${PANEL_SITE_ADDRESS:-:8080}
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - caddy_runtime:/runtime
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
      - control

  panel:
    build:
      context: ./apps/panel
    read_only: true
    mem_limit: 512m
    cpus: 1.00
    pids_limit: 256
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      agent:
        condition: service_healthy
    environment:
      PORT: 3000
      PANEL_PUBLIC_URL: ${PANEL_PUBLIC_URL:-http://localhost:8080}
      PANEL_LANGUAGE: ${PANEL_LANGUAGE:-de}
      DATABASE_URL: postgresql://${POSTGRES_USER:-vpspanel}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-vpspanel}
      SESSION_SECRET: ${SESSION_SECRET}
      PANEL_ADMIN_PASSWORD: ${PANEL_ADMIN_PASSWORD:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      AGENT_URL: http://agent:3100
      AGENT_TOKEN: ${AGENT_TOKEN}
      E2E_MODE: ${E2E_MODE:-false}
      E2E_SESSION_TOKEN: ${E2E_SESSION_TOKEN:-}
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - control
      - internal

  agent:
    build:
      context: ./apps/agent
    read_only: true
    mem_limit: 1g
    cpus: 2.00
    pids_limit: 512
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m
      - /run:rw,nosuid,nodev,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    environment:
      PORT: 3100
      AGENT_TOKEN: ${AGENT_TOKEN}
      PANEL_SITE_ADDRESS: ${PANEL_SITE_ADDRESS:-:8080}
      DOCKER_CONFIG: /tmp/docker
      PROJECTS_ROOT: /data/projects
      EDGE_NETWORK: vpspanel_edge
      CADDY_CONFIG_PATH: /caddy/Caddyfile
      CADDY_CONTAINER: vpspanel-caddy-1
      CADDY_REGISTRY_PATH: /caddy/caddy-projects.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - projects_data:/data/projects
      - caddy_runtime:/caddy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - control

  database:
    image: postgres:17.5-alpine
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.00
    pids_limit: 256
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpspanel}
      POSTGRES_USER: ${POSTGRES_USER:-vpspanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpspanel} -d ${POSTGRES_DB:-vpspanel}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

networks:
  edge:
  control:
  internal:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  caddy_runtime:
  postgres_data:
  projects_data: