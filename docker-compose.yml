name: vpspanel

services:
  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    depends_on:
      panel:
        condition: service_healthy
    environment:
      PANEL_SITE_ADDRESS: ${PANEL_SITE_ADDRESS:-:8080}
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

  panel:
    build:
      context: ./apps/panel
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      PORT: 3000
      PANEL_PUBLIC_URL: ${PANEL_PUBLIC_URL:-http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-vpspanel}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-vpspanel}
      SESSION_SECRET: ${SESSION_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - edge
      - internal

  database:
    image: postgres:17.5-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vpspanel}
      POSTGRES_USER: ${POSTGRES_USER:-vpspanel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpspanel} -d ${POSTGRES_DB:-vpspanel}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

networks:
  edge:
  internal:
    internal: true

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
